# Eclipse Mosquitto configuration for Agentic IoT Platform

# ── Listeners ────────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Authentication ────────────────────────────────────────────────────────────
# In production, set allow_anonymous to false and provide a password file:
# allow_anonymous false
# password_file /mosquitto/config/passwd

allow_anonymous true

# ── Persistence ──────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── Connection limits ─────────────────────────────────────────────────────────
max_connections 500
max_inflight_messages 20
max_queued_messages 1000
